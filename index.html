<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Пасьянс Паук</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🕷️ Пасьянс Паук</h1>
            <div id="controls">
                <div id="score-display">Счет: <span id="score">0</span></div>
                <div id="moves-display">Ходов: <span id="moves">0</span></div>
                <button id="difficulty-btn">Сложность</button>
                <button id="shirt-btn">Рубашки</button>
                <button id="undo-btn">Отмена</button>
                <button id="new-game-btn">Новая игра</button>
            </div>
        </header>

        <div id="game-layout">
            <!-- Левая панель: завершенные колоды -->
            <div id="left-panel">
                <div id="foundation-area"></div>
            </div>

            <!-- Центр: игровое поле -->
            <div id="tableau">
                <div class="column" data-col="0"></div>
                <div class="column" data-col="1"></div>
                <div class="column" data-col="2"></div>
                <div class="column" data-col="3"></div>
                <div class="column" data-col="4"></div>
                <div class="column" data-col="5"></div>
                <div class="column" data-col="6"></div>
                <div class="column" data-col="7"></div>
                <div class="column" data-col="8"></div>
                <div class="column" data-col="9"></div>
            </div>

            <!-- Правая панель: сток -->
            <div id="right-panel">
                <div id="stock-section">
                    <div id="stock-label">Колода</div>
                    <div id="stock-pile" class="stock-pile">
                        <div class="card back" data-index="0"></div>
                        <div class="card back" data-index="1"></div>
                        <div class="card back" data-index="2"></div>
                        <div class="card back" data-index="3"></div>
                        <div class="card back" data-index="4"></div>
                    </div>
                    <div id="stock-count">5</div>
                </div>
            </div>
        </div>

        <!-- Выбор сложности -->
        <div id="difficulty-overlay" class="hidden">
            <div id="difficulty-modal">
                <button id="difficulty-close-btn" aria-label="Закрыть">&times;</button>
                <h2>🕷️ Пасьянс Паук</h2>
                <p>Выберите сложность:</p>
                <div id="difficulty-buttons">
                    <button class="diff-btn" data-suits="1">
                        <span class="diff-title">1 масть</span>
                        <span class="diff-desc">♠ Простая</span>
                    </button>
                    <button class="diff-btn" data-suits="2">
                        <span class="diff-title">2 масти</span>
                        <span class="diff-desc">♠ ♥ Средняя</span>
                    </button>
                    <button class="diff-btn" data-suits="4">
                        <span class="diff-title">4 масти</span>
                        <span class="diff-desc">♠ ♥ ♣ ♦ Сложная</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="shirt-overlay" class="hidden">
            <div id="shirt-modal">
                <button id="shirt-close-btn" aria-label="Закрыть">&times;</button>
                <h2>👕 Рубашки карт</h2>
                <p>Выберите дизайн рубашки:</p>
                <div id="shirt-grid">
                    <button class="shirt-btn" data-shirt="0">
                        <div class="shirt-preview shirt-0"></div>
                        <span class="shirt-name">Классическая</span>
                    </button>
                    <button class="shirt-btn" data-shirt="1">
                        <div class="shirt-preview shirt-1"></div>
                        <span class="shirt-name">Изумруд</span>
                    </button>
                    <button class="shirt-btn" data-shirt="2">
                        <div class="shirt-preview shirt-2"></div>
                        <span class="shirt-name">Рубиновый</span>
                    </button>
                    <button class="shirt-btn" data-shirt="3">
                        <div class="shirt-preview shirt-3"></div>
                        <span class="shirt-name">В полоску</span>
                    </button>
                    <button class="shirt-btn" data-shirt="4">
                        <div class="shirt-preview shirt-4"></div>
                        <span class="shirt-name">Аметист</span>
                    </button>
                    <button class="shirt-btn" data-shirt="5">
                        <div class="shirt-preview shirt-5"></div>
                        <span class="shirt-name">Золотой</span>
                    </button>
                    <button class="shirt-btn" data-shirt="6">
                        <div class="shirt-preview shirt-6"></div>
                        <span class="shirt-name">Бургунди</span>
                    </button>
                    <button class="shirt-btn" data-shirt="7">
                        <div class="shirt-preview shirt-7"></div>
                        <span class="shirt-name">В клетку</span>
                    </button>
                    <button class="shirt-btn" data-shirt="8">
                        <div class="shirt-preview shirt-8"></div>
                        <span class="shirt-name">Пшеница</span>
                    </button>
                    <button class="shirt-btn" data-shirt="9">
                        <div class="shirt-preview shirt-9"></div>
                        <span class="shirt-name">На клетку</span>
                    </button>
                    <button class="shirt-btn" data-shirt="10">
                        <div class="shirt-preview shirt-10"></div>
                        <span class="shirt-name">Тёмная</span>
                    </button>
                    <button class="shirt-btn" data-shirt="11">
                        <div class="shirt-preview shirt-11"></div>
                        <span class="shirt-name">Радуга</span>
                    </button>
                    <button class="shirt-btn" data-shirt="12">
                        <div class="shirt-preview shirt-12"></div>
                        <span class="shirt-name">Французская</span>
                    </button>
                    <button class="shirt-btn" data-shirt="13">
                        <div class="shirt-preview shirt-13"></div>
                        <span class="shirt-name">Изумрудная</span>
                    </button>
                    <button class="shirt-btn" data-shirt="14">
                        <div class="shirt-preview shirt-14"></div>
                        <span class="shirt-name">В горошек</span>
                    </button>
                    <button class="shirt-btn" data-shirt="15">
                        <div class="shirt-preview shirt-15"></div>
                        <span class="shirt-name">Оранжевая</span>
                    </button>
                    <button class="shirt-btn" data-shirt="16">
                        <div class="shirt-preview shirt-16"></div>
                        <span class="shirt-name">Армейская</span>
                    </button>
                    <button class="shirt-btn" data-shirt="17">
                        <div class="shirt-preview shirt-17"></div>
                        <span class="shirt-name">Солнечная</span>
                    </button>
                    <button class="shirt-btn" data-shirt="18">
                        <div class="shirt-preview shirt-18"></div>
                        <span class="shirt-name">Изумрудно-лаймовая</span>
                    </button>
                    <button class="shirt-btn" data-shirt="19">
                        <div class="shirt-preview shirt-19"></div>
                        <span class="shirt-name">Диагональная</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="win-overlay" class="hidden">
            <div id="win-modal">
                <h2>🎉 Победа! 🎉</h2>
                <p>Счет: <span id="win-score">0</span></p>
                <p>Ходов: <span id="win-moves">0</span></p>
                <button id="play-again-btn">Играть снова</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
