<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Пасьянс Паук</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🕷️ Пасьянс Паук</h1>
            <div id="controls">
                <div id="score-display">Счет: <span id="score">0</span></div>
                <div id="moves-display">Ходов: <span id="moves">0</span></div>
                <button id="undo-btn">Отмена</button>
                <button id="new-game-btn">Новая игра</button>
            </div>
        </header>

        <div id="game-layout">
            <!-- Левая панель: завершенные колоды -->
            <div id="left-panel">
                <div id="foundation-area"></div>
            </div>

            <!-- Центр: игровое поле -->
            <div id="tableau">
                <div class="column" data-col="0"></div>
                <div class="column" data-col="1"></div>
                <div class="column" data-col="2"></div>
                <div class="column" data-col="3"></div>
                <div class="column" data-col="4"></div>
                <div class="column" data-col="5"></div>
                <div class="column" data-col="6"></div>
                <div class="column" data-col="7"></div>
                <div class="column" data-col="8"></div>
                <div class="column" data-col="9"></div>
            </div>

            <!-- Правая панель: сток -->
            <div id="right-panel">
                <div id="stock-section">
                    <div id="stock-label">Колода</div>
                    <div id="stock-pile" class="stock-pile">
                        <div class="card back" data-index="0"></div>
                        <div class="card back" data-index="1"></div>
                        <div class="card back" data-index="2"></div>
                        <div class="card back" data-index="3"></div>
                        <div class="card back" data-index="4"></div>
                    </div>
                    <div id="stock-count">5</div>
                </div>
            </div>
        </div>

        <div id="win-overlay" class="hidden">
            <div id="win-modal">
                <h2>🎉 Победа! 🎉</h2>
                <p>Счет: <span id="win-score">0</span></p>
                <p>Ходов: <span id="win-moves">0</span></p>
                <button id="play-again-btn">Играть снова</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
